apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: worker
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/TheRealRedrains/k1x-practice.git
    targetRevision: main
    path: services/worker
  destination:
    server: https://kubernetes.default.svc
    namespace: k1x-apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
