apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: database
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/TheRealRedrains/k1x-practice.git
    targetRevision: feature/new-schema
    path: services/database
  destination:
    server: https://kubernetes.default.svc
    namespace: k1x-apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
