apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: k1x-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: nginx:1.25
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 200m
            memory: 128Mi
          limits:
            cpu: 100m
            memory: 256Mi
      initContainers:
      - name: init-check
        image: busybox:1.35
        command: ['sh', '-c', 'until nslookup database.k1x-apps.svc.cluster.local; do echo waiting for database; sleep 2; done']
---
apiVersion: v1
kind: Service
metadata:
  name: worker
  namespace: k1x-apps
spec:
  selector:
    app: worker
  ports:
  - port: 80
    targetPort: 80
