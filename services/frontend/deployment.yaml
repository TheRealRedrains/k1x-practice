apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: k1x-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: nginx:1.25
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 100m
            memory: 32Mi
          limits:
            cpu: 200m
            memory: 35Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: k1x-apps
spec:
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
